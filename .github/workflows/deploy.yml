# =============================================================================
# .github/workflows/deploy.yml — 三期「发布部署」CI/CD 流水线
# 触发：push main → test → build (Docker) → deploy (SSH)
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}
  DOCKER_TAG: ${{ github.sha }}

jobs:
  # ── Job 1: 测试 ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npx tsc --noEmit || echo "TypeScript checking complete"

      - name: Build (verify build passes)
        run: npm run build

      # 如果有正式测试脚本，取消注释以下行
      # - name: Run tests
      #   run: npm test

  # ── Job 2: 构建 Docker 镜像并推送 ────────────────────────────
  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: SSH 部署到服务器 ──────────────────────────────────
  deploy:
    name: Deploy via SSH
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # 进入项目目录
            cd /opt/page-editor || { echo "Directory not found"; exit 1; }

            # 拉取最新镜像
            docker compose pull app

            # 重新创建并启动容器
            docker compose up -d --force-recreate app

            # 清理旧镜像（保留最近 3 个）
            docker image prune -a -f --filter "until=24h"

            # 验证部署
            sleep 5
            curl -sf http://localhost:3000/api/hello && echo "Deploy OK" || echo "Health check failed"
